    .sidebar {

      background: #f5f5f5;

      overflow-y: auto;

    }

    .shop-card {
      background: #ffffff;

      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      /* เงานิดๆ */
    }

    .shop-card:hover {
      background: #fafafa;
      transform: translateY(-2px);
      transition: 0.2s;
    }

    /* ===== TOGGLE BUTTON ===== */
    #toggleSidebar {
      position: fixed;
      top: 50%;
      /* ตรงกลางแนวตั้ง */
      left: 337px;
      /* ตอน sidebar เปิด */
      transform: translateY(-50%);
      z-index: 10001;
      background: #111;
      color: white;
      border: none;
      padding: 15px 8px;
      border-radius: 0 8px 8px 0;
      cursor: pointer;
      transition: left 0.3s ease;
      font-size: 18px;
    }

    /* ===== ซ่อน sidebar ===== */
    .sidebar {
      width: 320px;
      background: #f5f5f5;
      padding: 15px;
      overflow-y: auto;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, width 0.3s ease;
      /* animation ลื่น */
    }

    .sidebar.hidden {
      transform: translateX(-100%);
      width: 0;
      /* ทำให้ย่อจนหายไป */
      padding: 0;
      overflow: hidden;
    }

    @media (max-width: 768px) {
      body {
        flex-direction: column-reverse;
      }

      .sidebar {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 45vh;
        max-height: 45vh;
        overflow-y: auto;
        transform: translateY(0);
        transition: transform 0.3s ease;
        z-index: 1000;
        border-radius: 16px 16px 0 0;
        box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15);
        padding: 10px 12px 70px 12px;
        /* เพิ่ม padding bottom กันปุ่มบัง */
        box-sizing: border-box;
      }

      .sidebar.hidden {

      }

      #map {

        left: 0;
        width: 100%;
        height: 100%;
      }

        top: auto;

    function toggleSidebar() {
      const sidebar = document.querySelector(".sidebar");
      const btn = document.getElementById("toggleSidebar");
      const isMobile = window.innerWidth <= 768;

      sidebar.classList.toggle("hidden");

      if (isMobile) {
        btn.innerText = sidebar.classList.contains("hidden") ? "☰ แสดงร้าน" : "✕ ซ่อน";
      } else {
        if (sidebar.classList.contains("hidden")) {
          btn.style.left = "0";
          btn.innerText = ">";
        } else {
          btn.style.left = "350px";
          btn.innerText = "<";
        }
      }
    }

          return response.json();

        .then(data => {

        .catch(err => {

          // ✅ fallback

          applyFilters();
        });

    // ฟังก์ชันเช็คเวลาปัจจุบัน
    function isOpenNow(shop) {
      const now = new Date();
      const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
      const day = dayNames[now.getDay()];
      const hours = shop.hours[day];
      if (hours === "closed") return false;

      const [start, end] = hours.split('-').map(t => t.split(':').map(Number));
      const startDate = new Date(now); startDate.setHours(start[0], start[1], 0, 0);
      let endDate = new Date(now); endDate.setHours(end[0], end[1], 0, 0);
      if (endDate < startDate) endDate.setDate(endDate.getDate() + 1);
      return now >= startDate && now <= endDate;
    }

    function locateUser() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          position => {
            const pos = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };
            userPosition = pos;

            if (userMarker) {
              userMarker.setPosition(pos);
            } else {
              userMarker = new google.maps.Marker({
                position: pos,
                map: map,
                icon: {
                  url: "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                  scaledSize: new google.maps.Size(40, 40)
                },
                title: currentLang === 'th' ? "คุณอยู่ที่นี่" : currentLang === 'zh' ? "你的位置" : "You are here"
              });
            }

            map.panTo(pos);
            applyFilters();
          },
          () => {
            alert(currentLang === 'th' ? "ไม่สามารถระบุตำแหน่งของคุณได้" :
              currentLang === 'zh' ? "无法获取您的位置" :

      } else {
        alert(currentLang === 'th' ? "เบราว์เซอร์นี้ไม่รองรับการหาตำแหน่ง" :
          currentLang === 'zh' ? "此浏览器不支持定位" :
            "Browser doesn't support geolocation");

    // ===== FILTER =====
    function applyFilters() {
      const keyword = document.getElementById("search").value.toLowerCase();
      const category = document.getElementById("category").value;
      const price = document.getElementById("price").value;

      const filtered = foodShopsData.filter(shop => {
        const matchName = shop.name[currentLang].toLowerCase().includes(keyword);
        const matchCategory = category === "all" || shop.category === category;
        const matchPrice = price === "all" || shop.price === price;

        const matchFavorite = !showOnlyFavorites || favorites.includes(shop.id);

        return matchName && matchCategory && matchPrice && matchFavorite;
      });

      renderList(filtered);

    function extractDataFromGoogleMaps(url) {
      let lat, lng;

      // ✅ ใช้พิกัดจริง (3d / 4d)
      const realMatch = url.match(/!3d([-0-9.]+)!4d([-0-9.]+)/);

      // fallback ถ้าไม่มี
      const coordMatch = url.match(/@([-0-9.]+),([-0-9.]+)/);

      if (realMatch) {
        lat = parseFloat(realMatch[1]);
        lng = parseFloat(realMatch[2]);
      } else if (coordMatch) {
        lat = parseFloat(coordMatch[1]);
        lng = parseFloat(coordMatch[2]);
      } else {
        return null;
      }

      // ดึงชื่อร้าน
      const nameMatch = url.match(/place\/([^/]+)/);
      let name = "ร้านใหม่";

      if (nameMatch) {
        name = decodeURIComponent(nameMatch[1].replace(/\+/g, " "));
      }

      return { lat, lng, name };
    }


    function addShopFromLink() {

const ratingInput = document.getElementById("shopRating").value;
const rating = ratingInput ? parseFloat(ratingInput) : translations.unknown[currentLang];

const location = document.getElementById("shopLocation").value || translations.unknown[currentLang];

const desc = document.getElementById("shopDesc").value || translations.unknown[currentLang];
  const price = document.getElementById("shopPrice").value || "low";

    function getRouteToShop(lat, lng, mode) {
      if (!userPosition) {
        alert("กรุณากด 'ตำแหน่งของฉัน' ก่อน");
        return;
      }

      let travelMode = "walking";
      if (mode === "DRIVING") travelMode = "driving";
      if (mode === "BICYCLING") travelMode = "bicycling";

      const url = `https://www.google.com/maps/dir/?api=1&origin=${userPosition.lat},${userPosition.lng}&destination=${lat},${lng}&travelmode=${travelMode}`;

      window.open(url, "_blank");
    }
    function goRoute(shopId, lat, lng) {
      const mode = document.getElementById(`mode-${shopId}`).value;

      let travelMode = "walking";
      if (mode === "DRIVING") travelMode = "driving";
      if (mode === "BICYCLING") travelMode = "bicycling";

      const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=${travelMode}`;

      window.open(url, "_blank"); // เปิดแท็บใหม่
    }
    function getDistance(lat1, lng1, lat2, lng2) {
      const R = 6371; // km
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);

      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

      const today = new Date();

        case "en":
          formattedDate = today.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
          break;
        case "zh":
          // แก้ตรงนี้
          const day = String(today.getDate()).padStart(2, '0');
          const month = String(today.getMonth() + 1).padStart(2, '0');
          formattedDate = `${today.getFullYear()}年${month}月${day}日`;
          break;
      }

      dateContainer.innerText = translations.lastUpdateText[currentLang] + formattedDate;
    }
